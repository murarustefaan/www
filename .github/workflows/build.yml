name: check and build

on:
  workflow_dispatch:
  push:
    branches: [main]
    tags: ["v[0-9]+.[0-9]+.[0-9]+"]

permissions:
  contents: write
  actions: write

jobs:
  check:
    name: Check for build and type issues
    runs-on: worker
    steps:
      - name: checkout
        uses: actions/checkout@v4
      - name: install node
        uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: install pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 8
          run_install: false
      - name: get pnpm store directory
        shell: bash
        run: |
          echo "PNPM_CACHE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV
      - name: setup pnpm cache
        uses: actions/cache@v4
        with:
          path: ${{ env.PNPM_CACHE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-
      - name: install dependencies
        run: pnpm install
      - name: run check
        run: pnpm astro check
      - name: run build
        run: pnpm build

  build:
    needs:
      - check
    if: startsWith(github.ref, 'refs/tags/v')
    name: Build Docker image and push
    runs-on: worker
    outputs:
      version: ${{ steps.version.outputs.value }}
    steps:
      - name: checkout
        uses: actions/checkout@v4
      - name: Extract version from git tag
        id: version
        run: echo "value=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
      - name: Set up Buildx (amd64)
        id: buildx-amd64
        uses: docker/setup-buildx-action@v3
        with:
          driver: remote
          endpoint: tcp://buildkit-amd64.actions.svc.cluster.local:1234
          append: ""
      - name: Append arm64 builder
        uses: docker/setup-buildx-action@v3
        with:
          driver: remote
          endpoint: tcp://buildkit-arm64.actions.svc.cluster.local:1234
          append: |
            - endpoint: tcp://buildkit-arm64.actions.svc.cluster.local:1234
              platforms: linux/arm64
      - name: Login to registry
        uses: docker/login-action@v3
        with:
          registry: registry.stefanmuraru.com
          username: builder
          password: ${{ secrets.REGISTRY_PASSWORD }}
      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            registry.stefanmuraru.com/www:latest
            registry.stefanmuraru.com/www:${{ steps.version.outputs.value }}
          cache-from: type=registry,ref=registry.stefanmuraru.com/www:buildcache
          cache-to: type=registry,ref=registry.stefanmuraru.com/www:buildcache,mode=max

  deploy:
    needs:
      - build
    name: Update deployment manifest
    runs-on: worker
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main
      - name: Update kustomize image tag
        run: |
          cd deploy/overlays/production
          kustomize edit set image "murarustefaan/www=registry.stefanmuraru.com/www:$VERSION"
        env:
          VERSION: ${{ needs.build.outputs.version }}
      - name: Commit and push
        run: |
          git config user.name "fram[bot]"
          git config user.email "fram[bot]@users.noreply.github.com"
          git add deploy/overlays/production/kustomization.yaml
          git diff --cached --quiet && echo "No changes to commit" && exit 0
          git commit -m "chore: deploy www $VERSION"
          git push
        env:
          VERSION: ${{ needs.build.outputs.version }}
