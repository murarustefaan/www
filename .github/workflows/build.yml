name: build and deploy

on:
  workflow_call:
    inputs:
      version:
        required: true
        type: string
  workflow_dispatch:
    inputs:
      version:
        required: true
        type: string
        description: "Version to build and deploy (e.g. 2026.8.0)"

permissions:
  contents: write

jobs:
  build:
    name: Build Docker image and push
    runs-on: worker
    steps:
      - name: checkout
        uses: actions/checkout@v4
      - name: Set up Buildx (multi-arch)
        uses: docker/setup-buildx-action@v3
        with:
          driver: remote
          endpoint: tcp://buildkit-amd64.actions.svc.cluster.local:1234
          append: |
            - endpoint: tcp://buildkit-arm64.actions.svc.cluster.local:1234
              platforms: linux/arm64
      - name: Login to registry
        uses: docker/login-action@v3
        with:
          registry: registry.stefanmuraru.com
          username: builder
          password: ${{ secrets.REGISTRY_PASSWORD }}
      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            registry.stefanmuraru.com/www:latest
            registry.stefanmuraru.com/www:${{ inputs.version }}
          cache-from: type=registry,ref=registry.stefanmuraru.com/www:buildcache
          cache-to: type=registry,ref=registry.stefanmuraru.com/www:buildcache,mode=max

  deploy:
    needs: build
    name: Update deployment manifest
    runs-on: worker
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main
      - name: Update kustomize image tag
        run: |
          cd deploy/overlays/production
          sed -i "s|newTag:.*|newTag: \"$VERSION\"|" kustomization.yaml
        env:
          VERSION: ${{ inputs.version }}
      - name: Commit and push
        run: |
          git config user.name "fram[bot]"
          git config user.email "fram[bot]@users.noreply.github.com"
          git add deploy/overlays/production/kustomization.yaml
          git diff --cached --quiet && echo "No changes to commit" && exit 0
          git commit -m "chore: deploy www $VERSION"
          git push
        env:
          VERSION: ${{ inputs.version }}
