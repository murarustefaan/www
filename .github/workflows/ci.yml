name: check and build

on:
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  packages: read

jobs:
  check:
    name: Check for build and type issues
    runs-on: ubuntu-latest

    steps:
      - name: checkout
        uses: actions/checkout@v4

      - name: install pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: install node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'

      - name: get pnpm store directory
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: setup pnpm cache
        uses: actions/cache@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: install dependencies
        run: pnpm install --frozen-lockfile

      - name: rebuild sharp for linux
        run: pnpm rebuild sharp

      - name: run type check
        run: pnpm astro check

      - name: cache astro build
        uses: actions/cache@v4
        with:
          path: |
            dist
            .astro
          key: ${{ runner.os }}-astro-${{ hashFiles('src/**/*', 'public/**/*', 'astro.config.*', 'package.json') }}
          restore-keys: |
            ${{ runner.os }}-astro-

      - name: run build
        run: pnpm build

      - name: upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-output
          path: |
            dist
            nginx.conf
            Dockerfile
          retention-days: 1

  build:
    needs:
      - check
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    name: Build Docker image
    runs-on: ubuntu-latest

    steps:
      - name: checkout
        uses: actions/checkout@v4

      - name: download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-output

      - name: Extract version from package.json
        uses: sergeysova/jq-action@v2
        id: version
        with:
          cmd: 'jq .version package.json -r'

      - name: Set up Docker Buildx
        id: buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build image and push to Docker Hub
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          tags: |
            murarustefaan/www:latest
            murarustefaan/www:${{ steps.version.outputs.value }}
          platforms: linux/amd64,linux/arm64
          push: true
          cache-from: |
            type=gha
            type=registry,ref=murarustefaan/www:buildcache
          cache-to: |
            type=gha,mode=max
            type=registry,ref=murarustefaan/www:buildcache,mode=max
          provenance: false
