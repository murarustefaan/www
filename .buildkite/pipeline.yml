env:
  REGISTRY: "registry.stefanmuraru.com"
  IMAGE_NAME: "www"
  NODE_IMAGE: "node:24-bullseye-slim"
  BUILDX_BUILDER: "multi"

steps:
  - label: ":lint: Check"
    key: "check"
    env:
      BUILDKITE_IMAGE: "${NODE_IMAGE}"
    commands:
      - corepack enable
      - pnpm install --frozen-lockfile
      - pnpm astro check
      - pnpm build

  - label: ":docker: Build and Push"
    key: "docker-build"
    if: build.tag =~ /^v/
    depends_on: "check"
    plugins:
      - kubernetes:
          podSpec:
            containers:
              - image: docker:cli
                env:
                  - name: REGISTRY_PASSWORD
                    valueFrom:
                      secretKeyRef:
                        name: registry-auth-registry-stefanmuraru-com
                        key: PASSWORD
    commands:
      - echo "$$REGISTRY_PASSWORD" | docker login -u builder --password-stdin "${REGISTRY}"
      - docker buildx inspect "${BUILDX_BUILDER}" >/dev/null 2>&1 || docker buildx create --name "${BUILDX_BUILDER}" --driver remote --use tcp://buildkit-amd64.actions.svc.cluster.local:1234
      - docker buildx create --name "${BUILDX_BUILDER}" --append --platform linux/arm64 tcp://buildkit-arm64.actions.svc.cluster.local:1234 || true
      - docker buildx use "${BUILDX_BUILDER}"
      - >
        docker buildx build
        --platform linux/amd64,linux/arm64
        --push
        --tag "${REGISTRY}/${IMAGE_NAME}:$${BUILDKITE_TAG#v}"
        --tag "${REGISTRY}/${IMAGE_NAME}:latest"
        --cache-from type=registry,ref=${REGISTRY}/${IMAGE_NAME}:buildcache
        --cache-to type=registry,ref=${REGISTRY}/${IMAGE_NAME}:buildcache,mode=max
        .