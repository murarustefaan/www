version: 2.1

orbs:
  node: circleci/node@7

executors:
  default:
    docker:
      - image: cimg/node:24.0

jobs:
  check:
    executor: default
    steps:
      - checkout
      - run:
          name: Install pnpm
          command: corepack enable && corepack prepare pnpm@8 --activate
      - restore_cache:
          keys:
            - pnpm-store-{{ checksum "pnpm-lock.yaml" }}
            - pnpm-store-
      - run:
          name: Install dependencies
          command: pnpm install
      - save_cache:
          key: pnpm-store-{{ checksum "pnpm-lock.yaml" }}
          paths:
            - ~/.local/share/pnpm/store
      - run:
          name: Astro check
          command: pnpm astro check
      - run:
          name: Build
          command: pnpm build

  build:
    machine:
      image: ubuntu-2404:current
    steps:
      - checkout
      - run:
          name: Build Docker image
          command: docker build .

workflows:
  check-and-build:
    jobs:
      - check
      - build:
          requires:
            - check
