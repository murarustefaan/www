apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: www
  namespace: www
spec:
  parentRefs:
    - name: public
      namespace: gateway-system
      sectionName: https-apex
  hostnames:
    - stefanmuraru.com
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: www
          port: 80
      timeouts:
        request: 30s
        backendRequest: 10s
      retry:
        attempts: 2
        backoff: 100ms
        codes:
          - 502
          - 503
          - 504
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: www-http-redirect
  namespace: www
spec:
  parentRefs:
    - name: public
      namespace: gateway-system
      sectionName: http-apex
  hostnames:
    - stefanmuraru.com
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      filters:
        - type: RequestRedirect
          requestRedirect:
            scheme: https
            statusCode: 301
