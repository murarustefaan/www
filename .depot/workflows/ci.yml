# Depot CI Migration
# Source: .github/workflows/ci.yml
#
# Changes made:
# - Changed GitHub runs-on labels to their Depot equivalents

name: check and build
on:
  workflow_dispatch:
  push:
    branches: [main]
permissions:
  contents: read
  actions: write
  id-token: write
jobs:
  check:
    name: Check for build and type issues
    runs-on: depot-ubuntu-latest # was: ubuntu-latest. Mapped standard GitHub runner to Depot equivalent.
    steps:
      - name: checkout
        uses: actions/checkout@v4
      - name: install node
        uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: install pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 8
          run_install: false
      - name: get pnpm store directory
        shell: bash
        run: |
          echo "PNPM_CACHE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV
      - name: setup pnpm cache
        uses: actions/cache@v4
        with:
          path: ${{ env.PNPM_CACHE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-
      - name: install dependencies
        run: pnpm install
      - name: run check
        run: pnpm astro check
      - name: run build
        run: pnpm build
  build:
    needs:
      - check
    name: Build Docker image
    runs-on: depot-ubuntu-latest # was: ubuntu-latest. Mapped standard GitHub runner to Depot equivalent.
    steps:
      - name: checkout
        uses: actions/checkout@v4
      - name: Extract version from package.json
        id: version
        run: echo "value=$(jq -r .version package.json)" >> "$GITHUB_OUTPUT"
      - name: Setup Depot CLI
        uses: depot/setup-action@v1
      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Build image and push to Docker Hub
        uses: depot/build-push-action@v1
        with:
          context: .
          tags: |
            murarustefaan/www:latest
            murarustefaan/www:${{ steps.version.outputs.value }}
          platforms: linux/amd64,linux/arm64
          push: true
